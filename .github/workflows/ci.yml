name: 👀 Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: 👷🏽‍♂️ Build
    runs-on: ubuntu-latest

    steps:
      - name: 👉 Checkout
        uses: actions/checkout@v2

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2.1.0
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16
          cache: "pnpm"

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 👟 Build
        run: pnpm build

  format:
    name: 🔎 Svelte Check
    runs-on: ubuntu-latest

    steps:
      - name: 👉 Checkout
        uses: actions/checkout@v3

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2.1.0
        with:
          version: latest

      - name: 📦 Setup node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16
          cache: "pnpm"

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 👟 Run check
        run: pnpm check

  lint:
    name: 🔎 ESLint
    runs-on: ubuntu-latest

    steps:
      - name: 👉 Checkout
        uses: actions/checkout@v3

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2.1.0
        with:
          version: latest

      - name: 📦 Setup node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16
          cache: "pnpm"

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 👟 Run ESLint
        run: pnpm lint:code

  bundlewatch:
    name: 🔎 BundleWatch
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: 👉 Checkout
        uses: actions/checkout@v3

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2.1.0
        with:
          version: latest

      - name: 👟 Run Bundlewatch
        uses: preactjs/compressed-size-action@v2
        with:
          pattern: "./.vercel_build_output/static/**/*.{js,css,html}"
          strip-hash: "\\b-[a-z0-9]{1,}\\b"
          compression: "brotli"

  e2e:
    name: 🔎 E2E Testing
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: 👉 Checkout
        uses: actions/checkout@v3

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2.1.0
        with:
          version: latest

      - name: 📦 Setup node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16
          cache: "pnpm"

      - name: 📀 Cache playwright binaries
        uses: actions/cache@v2
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          # TODO: Automatically get playwright version from manifest
          key: cache-playwright-linux-1.21.0

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Install playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install --with-deps

      - name: 👟 Run your tests
        run: pnpm test

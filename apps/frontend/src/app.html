<!DOCTYPE html>
<html data-theme="dark" lang="en">
	<head>
		<link
			rel="preload"
			href="/fonts/JM/normal.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link rel="preconnect" href="https://cdn.sanity.io" />
		<link rel="dns-prefetch" href="https://cdn.sanity.io" />
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			@font-face {
				font-family: JM;
				src: url("/fonts/JM/normal.woff2") format("woff2");
				font-style: normal;
				font-weight: 300 900;
				font-display: swap;
			}

			@font-face {
				font-family: JM;
				src: url("/fonts/JM/italic.woff2") format("woff2");
				font-style: italic;
				font-weight: 300 900;
				font-display: swap;
			}
		</style>
		%sveltekit.head%
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<link rel="mask-icon" href="/safari-pinned-tab.svg" color="#60a5fa" />
		<meta name="msapplication-TileColor" content="#60a5fa" />
		<meta name="theme-color" content="#60a5fa" />
	</head>
	<body>
		<script>
			const themePreference = localStorage.getItem("data-theme");

			if (themePreference) {
				document.documentElement.setAttribute("data-theme", themePreference);
			} else {
				window.matchMedia("(prefers-color-scheme: dark)").matches
					? document.documentElement.setAttribute("data-theme", "dark")
					: document.documentElement.setAttribute("data-theme", "light");
			}
		</script>
		%sveltekit.body%
	</body>
</html>
